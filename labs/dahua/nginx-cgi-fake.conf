server {
    listen 80 default_server;
    server_name _;

    # API CGI de Dahua simulada
    location /cgi-bin/ {
        alias /usr/share/nginx/html/cgi-bin/;
        
        # Permitir ejecución de scripts CGI
        location ~ \.cgi$ {
            gzip off;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.cgi;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            include fastcgi_params;
        }
    }

    # Snapshot simulado (imagen estática)
    location /cgi-bin/snapshot.cgi {
        alias /usr/share/nginx/html/cgi-bin/snapshot.jpg;
        default_type image/jpeg;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Root
    location / {
        return 200 'Dahua Camera Simulator';
        add_header Content-Type text/plain;
    }
}
