# Configuración insegura: expone información sensible del servidor

server {
    listen 80;
    server_name _;

    # ERROR: server_tokens on expone versión de nginx
    server_tokens on;

    root /usr/share/nginx/html;
    index index.html;

    # ERROR: directory listing activo
    autoindex on;

    location / {
        try_files $uri $uri/ =404;
    }

    # ERROR: archivos de backup accesibles públicamente
    location ~* \.(bak|old|swp|save|~)$ {
        # Sin deny, están accesibles
    }

    # ERROR: status page sin autenticación
    location /nginx_status {
        stub_status on;
        allow all;  # Debería ser allow 127.0.0.1;
    }
}
