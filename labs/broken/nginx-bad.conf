# Configuración de nginx con ERROR DE SINTAXIS intencional
# Falta un punto y coma (;) y tiene una directiva inválida

server {
    listen 80
    server_name example.com;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Directiva inválida — nginx no conoce esto
    invalid_directive on;

    # SSL mal configurado (falta ruta)
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/no-existe.crt;
    ssl_certificate_key /etc/nginx/ssl/no-existe.key;
}
